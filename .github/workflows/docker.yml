name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHA=${{ github.sha }}
          SHORT=${SHA::7}
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=ghcr.io/dorksoul/sprig:latest,ghcr.io/dorksoul/sprig:${SHORT}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/dorksoul/sprig:testing,ghcr.io/dorksoul/sprig:${SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
