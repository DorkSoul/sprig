<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprig</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Auth overlay -->
  <div id="auth-overlay" class="hidden">
    <div class="auth-card">
      <div class="auth-logo">Sprig</div>

      <form id="setup-form" class="auth-form hidden">
        <h2>Create admin account</h2>
        <input type="text" id="setup-username" placeholder="Username" autocomplete="username">
        <input type="password" id="setup-password" placeholder="Password (min 8 chars)" autocomplete="new-password">
        <button type="submit">Create account</button>
        <p class="auth-error hidden" id="setup-error"></p>
      </form>

      <form id="login-form" class="auth-form hidden">
        <h2>Sign in</h2>
        <input type="text" id="login-username" placeholder="Username" autocomplete="username">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button type="submit">Sign in</button>
        <p class="auth-error hidden" id="login-error"></p>
      </form>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">

    <!-- Topbar -->
    <header id="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">&#9776;</button>
        <span class="logo">Sprig</span>
      </div>
      <div class="topbar-center">
        <input type="search" id="search-input" placeholder="Search notes..." autocomplete="off">
      </div>
      <div class="topbar-right">
        <button id="user-menu-btn" class="icon-btn user-btn"></button>
        <div id="user-menu-dropdown" class="dropdown hidden">
          <span id="user-menu-name" class="dropdown-label"></span>
          <button id="admin-panel-btn" class="dropdown-item hidden">Admin panel</button>
          <button id="export-all-btn" class="dropdown-item">Export all notes</button>
          <button id="logout-btn" class="dropdown-item">Sign out</button>
        </div>
      </div>
    </header>

    <div id="layout">

      <!-- Sidebar -->
      <aside id="sidebar">
        <nav class="sidebar-nav">
          <button class="nav-item active" data-view="feed">Feed</button>
          <button class="nav-item" data-view="public">Public</button>
          <button class="nav-item" data-view="graph">Graph</button>
        </nav>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Tags</div>
          <ul id="tag-list"></ul>
        </div>
      </aside>

      <!-- Main content -->
      <main id="main-content">

        <!-- Feed view -->
        <div id="feed-view">
          <!-- Inline editor -->
          <div id="editor-container">
            <div id="editor-toolbar">
              <button data-cmd="bold" title="Bold"><strong>B</strong></button>
              <button data-cmd="italic" title="Italic"><em>I</em></button>
              <button data-cmd="underline" title="Underline"><u>U</u></button>
              <button data-cmd="strikethrough" title="Strikethrough"><s>S</s></button>
              <span class="toolbar-sep"></span>
              <button data-cmd="h1" title="Heading 1">H1</button>
              <button data-cmd="h2" title="Heading 2">H2</button>
              <button data-cmd="h3" title="Heading 3">H3</button>
              <span class="toolbar-sep"></span>
              <button data-cmd="ul" title="Bullet list">&#8226;&#8212;</button>
              <button data-cmd="ol" title="Numbered list">1&#8212;</button>
              <button data-cmd="blockquote" title="Blockquote">&#10078;</button>
              <span class="toolbar-sep"></span>
              <button data-cmd="code" title="Inline code">`</button>
              <button data-cmd="codeblock" title="Code block">```</button>
              <button data-cmd="link" title="Link">&#128279;</button>
              <button data-cmd="hr" title="Horizontal rule">&#8213;</button>
              <button data-cmd="image" title="Insert image">&#128444;</button>
            </div>
            <div id="editor-body" contenteditable="true" data-placeholder="What's on your mind..."></div>
            <div id="editor-footer">
              <div id="editor-tags-preview"></div>
              <div class="editor-actions">
                <input type="text" id="editor-title" placeholder="Title (optional)">
                <label class="visibility-toggle">
                  <input type="checkbox" id="editor-public"> Public
                </label>
                <button id="editor-import-btn" class="secondary-btn" title="Import Markdown file">Import .md</button>
                <button id="editor-save-btn">Save</button>
              </div>
            </div>
          </div>

          <div id="note-feed"></div>
        </div>

        <!-- Public view -->
        <div id="public-view" class="hidden">
          <h2 class="view-title">Public notes</h2>
          <div id="public-feed"></div>
        </div>

        <!-- Graph view -->
        <div id="graph-view" class="hidden">
          <h2 class="view-title">Note graph</h2>
          <canvas id="graph-canvas"></canvas>
        </div>

        <!-- Search results view -->
        <div id="search-view" class="hidden">
          <h2 class="view-title">Search results</h2>
          <div id="search-feed"></div>
        </div>

      </main>

    </div>

    <!-- Note expanded view modal -->
    <div id="note-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="modal-title"></h2>
          <button class="modal-close" id="modal-close-btn">&times;</button>
        </div>
        <div id="modal-content" class="note-body"></div>
        <div id="modal-tags" class="note-tags"></div>
        <div id="modal-meta" class="note-meta"></div>
        <div id="backlinks-section" class="hidden">
          <div class="sidebar-section-title">Backlinks</div>
          <ul id="backlinks-list"></ul>
        </div>
        <div class="modal-actions">
          <button id="modal-edit-btn">Edit</button>
          <button id="modal-export-html-btn">Export HTML</button>
          <button id="modal-export-text-btn">Export text</button>
          <button id="modal-delete-btn" class="danger-btn">Delete</button>
        </div>
      </div>
    </div>

    <!-- Edit note modal -->
    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h2>Edit note</h2>
          <button class="modal-close" id="edit-modal-close">&times;</button>
        </div>
        <div id="edit-editor-toolbar" class="editor-toolbar-clone"></div>
        <input type="text" id="edit-title" placeholder="Title (optional)" class="edit-title-input">
        <div id="edit-editor-body" contenteditable="true" data-placeholder="Note content..."></div>
        <div id="edit-tags-preview" class="editor-tags-preview"></div>
        <div class="modal-footer">
          <label class="visibility-toggle">
            <input type="checkbox" id="edit-public"> Public
          </label>
          <button id="edit-save-btn">Save changes</button>
        </div>
      </div>
    </div>

    <!-- Admin panel modal -->
    <div id="admin-modal" class="modal-overlay hidden">
      <div class="modal-box admin-modal-box">
        <div class="modal-header">
          <h2>Admin panel</h2>
          <button class="modal-close" id="admin-modal-close">&times;</button>
        </div>
        <div id="admin-content">
          <div class="admin-section">
            <h3>Users</h3>
            <table id="admin-users-table">
              <thead><tr><th>Username</th><th>Admin</th><th>Created</th><th></th></tr></thead>
              <tbody id="admin-users-tbody"></tbody>
            </table>
          </div>
          <div class="admin-section">
            <h3>Create user</h3>
            <form id="admin-create-user-form">
              <input type="text" id="new-user-username" placeholder="Username">
              <input type="password" id="new-user-password" placeholder="Password">
              <label><input type="checkbox" id="new-user-admin"> Admin</label>
              <button type="submit">Create</button>
              <p class="auth-error hidden" id="admin-user-error"></p>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="image-upload-input" accept="image/*" style="display:none">
  <input type="file" id="md-import-input" accept=".md,.txt" style="display:none">

  <!-- Note link autocomplete -->
  <div id="link-autocomplete" class="hidden">
    <ul id="link-autocomplete-list"></ul>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
